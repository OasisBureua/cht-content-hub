# Enforce: pull requests targeting main must come from release/* branches.
# Pair with a ruleset on main that requires this check to pass before merge.
#
# Optional hotfix path: allow hotfix/* → main by uncommenting the second pattern check.

name: Branch policy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read

jobs:
  main-from-release-only:
    name: main-from-release-only
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR head branch
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" =~ ^release/ ]]; then
            echo "✓ PR from release branch: $HEAD_REF"
            exit 0
          fi
          # Uncomment to allow emergency hotfixes:
          # if [[ "$HEAD_REF" =~ ^hotfix/ ]]; then
          #   echo "✓ PR from hotfix branch: $HEAD_REF"
          #   exit 0
          # fi
          echo "::error::Pull requests to main must come from a release/* branch (e.g. release/v1.0.0). Head branch: ${HEAD_REF:-<unknown>}"
          exit 1

  release-contains-main:
    name: release-contains-main
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify release branch is based on main
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin main
          if git merge-base --is-ancestor origin/main "origin/${HEAD_REF}"; then
            echo "✓ origin/main is an ancestor of origin/${HEAD_REF}"
          else
            echo "::error::Release branch must be created from (or include) main. Re-create: git checkout main && git pull && git checkout -b ${HEAD_REF}"
            exit 1
          fi
