name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      deploy_ecs_service:
        description: Build/push image and create ECS service
        type: boolean
        default: false
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - 'scripts/**'
      - '.github/workflows/**'

concurrency:
  group: deploy-contenthub-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 233636046512.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: contenthub-api
  TERRAFORM_VERSION: 1.10.5
  TF_ENV_DIR: infrastructure/terraform/environments/us-east-1
  TF_VAR_FILE: ../variables/prod.github.tfvars
  TF_BACKEND_CONFIG: ../backends/us-east-1-prod.hcl
  API_URL: https://contenthub.communityhealth.media
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Infra-only by default — API service via ./scripts/deploy-api-service.sh prod
  DEPLOY_ECS_SERVICE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ecs_service == 'true' && 'true' || 'false' }}

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend - Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Backend - Run tests
        working-directory: backend
        run: pytest -q

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform validate
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          terraform init -backend=false
          terraform validate

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.DEPLOY_ECS_SERVICE == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        if: env.DEPLOY_ECS_SERVICE == 'true'
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.ECR_REPO }}" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating ECR repository: ${{ env.ECR_REPO }}"
            aws ecr create-repository --repository-name "${{ env.ECR_REPO }}" --region "$AWS_REGION"
          fi

      - name: Generate semver image tag
        if: env.DEPLOY_ECS_SERVICE == 'true'
        id: meta
        run: |
          chmod +x scripts/next-ecr-image-tag.sh
          IMAGE_TAG="$(./scripts/next-ecr-image-tag.sh "${{ env.ECR_REPO }}" "$AWS_REGION")"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        if: env.DEPLOY_ECS_SERVICE == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        if: env.DEPLOY_ECS_SERVICE == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify GitHub Environment secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          PUBLIC_API_KEY: ${{ secrets.PUBLIC_API_KEY }}
          WEBHOOK_API_KEY: ${{ secrets.WEBHOOK_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_CACHE_SECRET: ${{ secrets.INTERNAL_CACHE_SECRET }}
        run: |
          chmod +x scripts/verify-github-env-secrets.sh
          ./scripts/verify-github-env-secrets.sh production

      - name: Terraform Init
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -reconfigure -backend-config="${{ env.TF_BACKEND_CONFIG }}"

      - name: Terraform Plan
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          PLAN_ARGS=(
            -var-file="${{ env.TF_VAR_FILE }}"
            -var="deploy_api_ecs_service=${{ env.DEPLOY_ECS_SERVICE }}"
            -out=tfplan
          )
          if [ "${{ env.DEPLOY_ECS_SERVICE }}" = "true" ]; then
            PLAN_ARGS+=(-var="api_image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}")
          fi
          terraform plan "${PLAN_ARGS[@]}"
        env:
          TF_VAR_public_api_key: ${{ secrets.PUBLIC_API_KEY }}
          TF_VAR_webhook_api_key: ${{ secrets.WEBHOOK_API_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_cache_secret: ${{ secrets.INTERNAL_CACHE_SECRET }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Wait for ECS API service stable
        if: env.DEPLOY_ECS_SERVICE == 'true'
        run: |
          aws ecs wait services-stable \
            --cluster contenthub-cluster \
            --services contenthub-api \
            --region "$AWS_REGION"
          echo "ECS service contenthub-api is stable"

      - name: Deployment Summary
        run: |
          echo "## Content Hub prod deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR repo | \`${{ env.ECR_REPO }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECS service | ${{ env.DEPLOY_ECS_SERVICE == 'true' && 'deployed' || 'skipped (infra only)' }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ env.DEPLOY_ECS_SERVICE }}" = "true" ]; then
            echo "| Image tag | \`${{ steps.meta.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| API | ${{ env.API_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
