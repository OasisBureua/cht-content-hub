name: Deploy to Production

# Prod deploy: merged release/* → main, or manual workflow_dispatch.
# Terraform apply (use1 + use2 DR) + ECS API image — GitHub Environment: production.
on:
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Plan only — skip apply approval and deploy steps'
        type: boolean
        default: false
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: deploy-contenthub-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_REGION_DR: us-east-2
  ECR_REGISTRY: 233636046512.dkr.ecr.us-east-1.amazonaws.com
  ECR_REGISTRY_DR: 233636046512.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPO: contenthub-api
  TERRAFORM_VERSION: 1.10.5
  TF_ENV_DIR: infrastructure/terraform/environments/us-east-1
  TF_ENV_DIR_DR: infrastructure/terraform/environments/us-east-2
  TF_VAR_FILE: ../variables/prod.github.tfvars
  TF_BACKEND_CONFIG: ../backends/us-east-1-prod.hcl
  TF_BACKEND_CONFIG_DR: ../backends/us-east-2-prod.hcl
  API_URL: https://contenthub.communityhealth.media
  ECS_CLUSTER: contenthub-cluster
  ECS_API_SERVICE: contenthub-api
  ECS_CLUSTER_DR: contenthub-dr-use2-cluster
  ECS_API_SERVICE_DR: contenthub-dr-use2-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  gate:
    name: Check deploy trigger
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      checkout_ref: ${{ steps.check.outputs.checkout_ref }}
    steps:
      - name: Evaluate trigger
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch)
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
              echo "checkout_ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
              echo "Trigger: manual workflow_dispatch on ${{ github.ref }}"
              ;;
            pull_request)
              if [ "$PR_MERGED" = "true" ] && [[ "$HEAD_REF" == release/* ]]; then
                echo "should_deploy=true" >> "$GITHUB_OUTPUT"
                echo "checkout_ref=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
                echo "Trigger: merged release PR ($HEAD_REF) → main"
              else
                echo "should_deploy=false" >> "$GITHUB_OUTPUT"
                echo "checkout_ref=" >> "$GITHUB_OUTPUT"
                echo "Skipped: not a merged release/* pull request to main"
              fi
              ;;
            *)
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "checkout_ref=" >> "$GITHUB_OUTPUT"
              ;;
          esac

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.checkout_ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend - Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Backend - Run tests
        working-directory: backend
        run: pytest -q

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform validate (use1 + use2)
        run: |
          terraform -chdir="${{ env.TF_ENV_DIR }}" init -backend=false
          terraform -chdir="${{ env.TF_ENV_DIR }}" validate
          terraform -chdir="${{ env.TF_ENV_DIR_DR }}" init -backend=false
          terraform -chdir="${{ env.TF_ENV_DIR_DR }}" validate

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: [gate, test]
    if: needs.gate.outputs.should_deploy == 'true'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.checkout_ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (us-east-1)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.ECR_REPO }}" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Creating ECR repository: ${{ env.ECR_REPO }}"
            aws ecr create-repository --repository-name "${{ env.ECR_REPO }}" --region "$AWS_REGION"
          fi

      - name: Generate image tag
        id: meta
        run: |
          chmod +x scripts/next-ecr-image-tag.sh
          IMAGE_TAG="$(./scripts/next-ecr-image-tag.sh "${{ env.ECR_REPO }}" "$AWS_REGION")"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image (us-east-1)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for ECR replication (us-east-2)
        run: |
          chmod +x scripts/wait-ecr-replication.sh
          ./scripts/wait-ecr-replication.sh "${{ env.ECR_REPO }}" "${{ steps.meta.outputs.image_tag }}" "${{ env.AWS_REGION_DR }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify GitHub Environment secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          PUBLIC_API_KEY: ${{ secrets.PUBLIC_API_KEY }}
          WEBHOOK_API_KEY: ${{ secrets.WEBHOOK_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_CACHE_SECRET: ${{ secrets.INTERNAL_CACHE_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REDIRECT_URI: ${{ secrets.LINKEDIN_REDIRECT_URI }}
          LINKEDIN_SCOPES: ${{ secrets.LINKEDIN_SCOPES }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          LINKEDIN_AD_ACCOUNT_ID: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
          LINKEDIN_ADS_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ADS_ACCESS_TOKEN }}
          LINKEDIN_ADS_CLIENT_ID: ${{ secrets.LINKEDIN_ADS_CLIENT_ID }}
          LINKEDIN_ADS_CLIENT_SECRET: ${{ secrets.LINKEDIN_ADS_CLIENT_SECRET }}
          LINKEDIN_ADS_REDIRECT_URI: ${{ secrets.LINKEDIN_ADS_REDIRECT_URI }}
          LINKEDIN_ADS_SCOPES: ${{ secrets.LINKEDIN_ADS_SCOPES }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CHANNEL_HANDLE: ${{ secrets.YOUTUBE_CHANNEL_HANDLE }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_ACCOUNT_HANDLE: ${{ secrets.X_ACCOUNT_HANDLE }}
          WORDPRESS_WEBHOOK_SECRET: ${{ secrets.WORDPRESS_WEBHOOK_SECRET }}
        run: |
          chmod +x scripts/verify-github-env-secrets.sh
          ./scripts/verify-github-env-secrets.sh production

      - name: Terraform Init (us-east-1)
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -reconfigure -backend-config="${{ env.TF_BACKEND_CONFIG }}"

      - name: Terraform Plan (us-east-1)
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          terraform plan \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="api_image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}" \
            -out=tfplan-use1
        env:
          TF_VAR_public_api_key: ${{ secrets.PUBLIC_API_KEY }}
          TF_VAR_webhook_api_key: ${{ secrets.WEBHOOK_API_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_cache_secret: ${{ secrets.INTERNAL_CACHE_SECRET }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_linkedin_client_id: ${{ secrets.LINKEDIN_CLIENT_ID }}
          TF_VAR_linkedin_client_secret: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          TF_VAR_linkedin_redirect_uri: ${{ secrets.LINKEDIN_REDIRECT_URI }}
          TF_VAR_linkedin_scopes: ${{ secrets.LINKEDIN_SCOPES }}
          TF_VAR_linkedin_org_urn: ${{ secrets.LINKEDIN_ORG_URN }}
          TF_VAR_linkedin_ad_account_id: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
          TF_VAR_linkedin_ads_access_token: ${{ secrets.LINKEDIN_ADS_ACCESS_TOKEN }}
          TF_VAR_linkedin_ads_client_id: ${{ secrets.LINKEDIN_ADS_CLIENT_ID }}
          TF_VAR_linkedin_ads_client_secret: ${{ secrets.LINKEDIN_ADS_CLIENT_SECRET }}
          TF_VAR_linkedin_ads_redirect_uri: ${{ secrets.LINKEDIN_ADS_REDIRECT_URI }}
          TF_VAR_linkedin_ads_scopes: ${{ secrets.LINKEDIN_ADS_SCOPES }}
          TF_VAR_youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          TF_VAR_youtube_channel_id: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TF_VAR_youtube_channel_handle: ${{ secrets.YOUTUBE_CHANNEL_HANDLE }}
          TF_VAR_x_bearer_token: ${{ secrets.X_BEARER_TOKEN }}
          TF_VAR_x_account_handle: ${{ secrets.X_ACCOUNT_HANDLE }}
          TF_VAR_wordpress_webhook_secret: ${{ secrets.WORDPRESS_WEBHOOK_SECRET }}

      - name: Terraform Init (us-east-2 DR)
        working-directory: ${{ env.TF_ENV_DIR_DR }}
        run: terraform init -reconfigure -backend-config="${{ env.TF_BACKEND_CONFIG_DR }}"

      - name: Terraform Plan (us-east-2 DR)
        working-directory: ${{ env.TF_ENV_DIR_DR }}
        run: |
          terraform plan \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="dr_api_image=${{ env.ECR_REGISTRY_DR }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}" \
            -out=tfplan-use2
        env:
          TF_VAR_public_api_key: ${{ secrets.PUBLIC_API_KEY }}
          TF_VAR_webhook_api_key: ${{ secrets.WEBHOOK_API_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_cache_secret: ${{ secrets.INTERNAL_CACHE_SECRET }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_linkedin_client_id: ${{ secrets.LINKEDIN_CLIENT_ID }}
          TF_VAR_linkedin_client_secret: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          TF_VAR_linkedin_redirect_uri: ${{ secrets.LINKEDIN_REDIRECT_URI }}
          TF_VAR_linkedin_scopes: ${{ secrets.LINKEDIN_SCOPES }}
          TF_VAR_linkedin_org_urn: ${{ secrets.LINKEDIN_ORG_URN }}
          TF_VAR_linkedin_ad_account_id: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
          TF_VAR_linkedin_ads_access_token: ${{ secrets.LINKEDIN_ADS_ACCESS_TOKEN }}
          TF_VAR_linkedin_ads_client_id: ${{ secrets.LINKEDIN_ADS_CLIENT_ID }}
          TF_VAR_linkedin_ads_client_secret: ${{ secrets.LINKEDIN_ADS_CLIENT_SECRET }}
          TF_VAR_linkedin_ads_redirect_uri: ${{ secrets.LINKEDIN_ADS_REDIRECT_URI }}
          TF_VAR_linkedin_ads_scopes: ${{ secrets.LINKEDIN_ADS_SCOPES }}
          TF_VAR_youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          TF_VAR_youtube_channel_id: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TF_VAR_youtube_channel_handle: ${{ secrets.YOUTUBE_CHANNEL_HANDLE }}
          TF_VAR_x_bearer_token: ${{ secrets.X_BEARER_TOKEN }}
          TF_VAR_x_account_handle: ${{ secrets.X_ACCOUNT_HANDLE }}
          TF_VAR_wordpress_webhook_secret: ${{ secrets.WORDPRESS_WEBHOOK_SECRET }}

      - name: Plan summary
        run: |
          echo "## Terraform plan summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### us-east-1" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform -chdir="${{ env.TF_ENV_DIR }}" show -json tfplan-use1 | jq -r '
            .resource_changes[]
            | select(.change.actions != ["no-op"])
            | "\(.change.actions | join(",")): \(.address)"
          ' >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### us-east-2 DR" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform -chdir="${{ env.TF_ENV_DIR_DR }}" show -json tfplan-use2 | jq -r '
            .resource_changes[]
            | select(.change.actions != ["no-op"])
            | "\(.change.actions | join(",")): \(.address)"
          ' >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event.inputs.plan_only }}" = "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "ℹ️ **Plan only** — apply skipped." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⏸️ **Awaiting approval** — comment **approve** on the pending issue to apply use1 + use2." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Approve Terraform apply
        if: github.event.inputs.plan_only != 'true'
        uses: trstringer/manual-approval@v1
        timeout-minutes: 120
        with:
          secret: ${{ github.token }}
          approvers: ${{ github.actor }}
          minimum-approvals: 1
          issue-title: "Approve prod Terraform apply (run #${{ github.run_number }})"
          issue-body: |
            Review Terraform Plan steps for workflow run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.

            Comment **approve** to run `terraform apply` on us-east-1 and us-east-2 DR.
            Comment **deny** to cancel.

      - name: Terraform Apply (us-east-1)
        if: github.event.inputs.plan_only != 'true'
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform apply tfplan-use1

      - name: Terraform Apply (us-east-2 DR)
        if: github.event.inputs.plan_only != 'true'
        working-directory: ${{ env.TF_ENV_DIR_DR }}
        run: terraform apply tfplan-use2

      - name: Wait for ECS API service stable (us-east-1)
        if: github.event.inputs.plan_only != 'true'
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_API_SERVICE }}" \
            --region "${{ env.AWS_REGION }}"
          echo "ECS service ${{ env.ECS_API_SERVICE }} is stable (use1)"

      - name: Wait for ECS API service stable (us-east-2)
        if: github.event.inputs.plan_only != 'true'
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER_DR }}" \
            --services "${{ env.ECS_API_SERVICE_DR }}" \
            --region "${{ env.AWS_REGION_DR }}" || echo "DR service wait skipped (may not exist yet)"
          echo "ECS service ${{ env.ECS_API_SERVICE_DR }} checked (use2)"

      - name: Deployment Summary
        if: github.event.inputs.plan_only != 'true'
        run: |
          echo "## Content Hub prod deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ steps.meta.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| use1 image | \`${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| use2 image | \`${{ env.ECR_REGISTRY_DR }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | ${{ env.API_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ needs.gate.outputs.checkout_ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Smoke from inside VPC / via CHT: \`./scripts/smoke.sh ${{ env.API_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
