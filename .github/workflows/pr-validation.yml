name: PR Validation

on:
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Terraform validate
        working-directory: infrastructure/terraform/environments/us-east-1
        run: |
          terraform init -backend=false
          terraform validate

      - name: Comment on PR
        uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const icon = success ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${icon} **PR Validation:** ${success ? 'All checks passed!' : 'Some checks failed'}`
            })
