name: Deploy to Development

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'worker/**'
      - 'infrastructure/**'
      - 'scripts/**'
      - '.github/workflows/deploy-dev.yml'
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: deploy-contenthub-dev
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 233636046512.dkr.ecr.us-east-1.amazonaws.com
  TERRAFORM_VERSION: 1.10.5
  TF_ENV_DIR: infrastructure/terraform/environments/us-east-1
  TF_VAR_FILE: ../variables/dev.github.tfvars
  TF_BACKEND_CONFIG: ../backends/us-east-1-dev.hcl
  API_URL: https://devhub.communityhealth.media
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Backend - Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Backend - Run tests
        working-directory: backend
        run: pytest -q

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform validate
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          terraform init -backend=false
          terraform validate

  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: test
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist
        run: |
          for repo in contenthub-api contenthub-worker; do
            if ! aws ecr describe-repositories --repository-names "$repo" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "Creating ECR repository: $repo"
              aws ecr create-repository --repository-name "$repo" --region "$AWS_REGION"
            fi
          done

      - name: Generate semver image tag
        id: meta
        run: |
          chmod +x scripts/next-dev-image-tag.sh
          IMAGE_TAG="$(./scripts/next-dev-image-tag.sh contenthub-api "$AWS_REGION")"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/contenthub-api:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/contenthub-api:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/contenthub-worker:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/contenthub-worker:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Verify GitHub Environment secrets
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          PUBLIC_API_KEY: ${{ secrets.PUBLIC_API_KEY }}
          WEBHOOK_API_KEY: ${{ secrets.WEBHOOK_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_CACHE_SECRET: ${{ secrets.INTERNAL_CACHE_SECRET }}
        run: |
          chmod +x scripts/verify-github-env-secrets.sh
          ./scripts/verify-github-env-secrets.sh development

      - name: Terraform Init
        working-directory: ${{ env.TF_ENV_DIR }}
        run: terraform init -reconfigure -backend-config="${{ env.TF_BACKEND_CONFIG }}"

      - name: Terraform Apply
        working-directory: ${{ env.TF_ENV_DIR }}
        run: |
          terraform apply \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="api_image=${{ env.ECR_REGISTRY }}/contenthub-api:${{ steps.meta.outputs.image_tag }}" \
            -var="worker_image=${{ env.ECR_REGISTRY }}/contenthub-worker:${{ steps.meta.outputs.image_tag }}" \
            -auto-approve
        env:
          TF_VAR_public_api_key: ${{ secrets.PUBLIC_API_KEY }}
          TF_VAR_webhook_api_key: ${{ secrets.WEBHOOK_API_KEY }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_internal_cache_secret: ${{ secrets.INTERNAL_CACHE_SECRET }}

      - name: Wait for ECS API service stable
        run: |
          aws ecs wait services-stable \
            --cluster contenthub-dev-cluster \
            --services contenthub-dev-api \
            --region "$AWS_REGION"
          echo "ECS service contenthub-dev-api is stable"

      - name: Deployment Summary
        run: |
          echo "## Content Hub dev deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ steps.meta.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | ${{ env.API_URL }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
